<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nino Berber | Projets</title>
    <link rel="stylesheet" href="./css/projects.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@latest/dist/css/splide.min.css">
</head>
<body>
    <nav id="navbar">
        <a href="index.html"><img class="logo" src="assets/img/Nino Berber_files/NB_logo_black.png" alt="Logo Nino Berber"></a>
        <div class="nav-links">
            <a href="./index.html" class="nav-item">Accueil</a>
            <a href="projects.html" class="nav-item selected">Projets</a>
            <a href="./propos.html" class="nav-item">À propos</a>
        </div>
        <a href="./propos.html"><button class="nav-button">Discutons</button></a>
        <div class="burger">
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
    <main>
        <section class="head-section">
            <h1>Projets</h1>
            <div class="filters">
                <div class="dev-anchor filter">
                    <a href="#dev">Développement</a>
                </div>
                <!-- <div class="design-anchor filter">
                    <a href="#design">Design</a>
                </div> -->
            </div>
        </section>
        <section id="dev" class="splide">
            <h2 id="carousel-heading">Développement</h2>
            <div class="splide__track">
                <ul class="splide__list">
                    <li class="splide__slide">
                        <a href="dev_project_1.html"><img src="./assets/img/project1_thumbnail.png" alt="First project thumbnail"></a>
                        <div class="slide-content">
                            <h3>Refonte d’un site</h3>
                            <p>Ce projet a été réalisé en équipe lors d’une semaine dédiée au développement web à <a href="https://www.mmibordeaux.com/" target="_blank">MMI Bordeaux</a>.</p>
                            <a href="./dev_project_1.html">
                                <button class="plus-button">
                                    En voir davantage
                                    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M14.3967 10.9601L22.9809 10.9601L22.9809 19.5444M10.9601 22.9809L22.8607 11.0803" stroke="black" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </a>
                        </div>
                    </li>
                </ul>  
            </div>
        </section>
        <section class="bottom-section">
            <h2>Discutons de votre projet</h2>
            <form id="form" action=”mailto:ninberber@gmail.com” method=”POST” enctype=”text/plain” name=”EmailForm”>
                <div>
                    <label for="firstname">Votre prénom</label><br>
                    <input type="text" id="name" name="firstname" placeholder="Prénom">
                </div>
                <div>
                    <label for="lastname">Votre nom</label><br>
                    <input type="text" id="name" name="lastname" placeholder="Nom">
                </div>
                <div>
                    <label for="email">Votre adresse e-mail</label>
                    <input type="email" placeholder="E-mail"> 
                </div>
                <div>
                    <label for="message">Votre message</label><br>
                    <textarea placeholder="Message" name="contact-message" id="message" cols="30" rows="10"></textarea>
                </div>
                <div>
                    <button id="submit" type="submit">Envoyer</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <a href="./mentions-legales.html">Mentions légales</a>
    </footer>
    <script src="./js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@1.3.3/dist/js/splide.min.js"></script>
    <script>
        var splide = new Splide( '.splide', {
            type   : 'loop',
            padding: '5rem',
            margin : '5rem',
        });
        splide.mount();
    </script>
</body>
</html>
