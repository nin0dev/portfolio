<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nino Berber</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav id="navbar">
        <a href="/portfolio/homepage/index.html"><img class="logo" src="/portfolio/assets/img/NB_logo_black.png" alt="Logo Nino Berber"></a>
        <div class="nav-links">
            <a class="nav-item selected">Accueil</a>
            <a href="/portfolio/projects/projects.html" class="nav-item">Projets</a>
            <a href="/portfolio/propos/propos.html" class="nav-item">À propos</a>
        </div>
        <button class="nav-button"><a>Discutons</a></button>
        <div class="burger">
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <main>
        <section class="name-section">
                <div class="titles">
                    <h1>Nino Berber</h1>
                    <h2>Développeur web</h2>
                </div>
                <div class="sub-title">
                    <p>Franco-canadien basé à Bordeaux, je suis passionné par le web, et me spécialise dans le développement.</p>
                </div>
                <div class="buttons">
                    <button class="hire-button">Collaborons</button>
                    <a href="/portfolio/projects/projects.html"><button class="projects-button">Projets</button></a>  
                </div>
        </section>
        <section class="tools">
            <div class="figma-icon">
                <img src="/portfolio/assets/img/figma_logo.png" alt="Figma logo" height="34px">
                <p>Figma</p>                  
            </div>
            <div class="html-icon">
                <img src="/portfolio/assets/img/html_logo.png" alt="HTML logo" width="35px">
                <p>HTML5</p>                  
            </div>
            <div class="css-icon">
                <img src="/portfolio/assets/img/css_logo.png" alt="CSS logo" width="35px">  
                <p>CSS3</p>                  
            </div>
            <div class="wordpress-icon">
                <img src="/portfolio/assets/img/wordpress_logo.png" alt="Wordpress logo" width="35px">
                <p>WordPress</p>        
            </div>
        </section>
        <div class="double-column">
            <section class="photo-column">
                <div class="profile-pic">
                    <img src="/portfolio/assets/img/Nino Berber.png" alt="Nino Berber's portrait picture">
                </div>
            </section>
            <section class="contact-links">
                <div class="cv-link">
                    <a href="">Voir CV</a>
                    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14.3967 10.9601L22.9809 10.9601L22.9809 19.5444M10.9601 22.9809L22.8607 11.0803" stroke="white" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>      
                </div>   
                <div class="linkedin-link">
                    <a href="https://www.linkedin.com/in/nino-berber/" target="_blank">LinkedIn</a>
                    <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14.3967 10.9601L22.9809 10.9601L22.9809 19.5444M10.9601 22.9809L22.8607 11.0803" stroke="white" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>   
                </div>
            </section>
        </div>
    </main>
    <footer>
        <a href="">Mentions légales</a>
    </footer>
    <script>
        const burger = document.querySelector(".burger");
        const navMenu = document.querySelector(".nav-links");

        burger.addEventListener("click", mobileMenu);

        function mobileMenu() {
            burger.classList.toggle("active");
            navMenu.classList.toggle("active");
        }

        const navLink = document.querySelectorAll(".nav-item");

        navLink.forEach(n => n.addEventListener("click", closeMenu));

        function closeMenu() {
            burger.classList.remove("active");
            navMenu.classList.remove("active");
        }

        // When the user scrolls the page, execute myFunction
        window.onscroll = function() {myFunction()};

        // Get the navbar
        var navbar = document.getElementById("navbar");

        // Get the offset position of the navbar
        var sticky = navbar.offsetTop;

        // Add the sticky class to the navbar when you reach its scroll position. Remove "sticky" when you leave the scroll position
        function myFunction() {
        if (window.pageYOffset >= sticky) {
            navbar.classList.add("sticky")
        } else {
            navbar.classList.remove("sticky");
        }
        }
    </script>
</body>
</html>
