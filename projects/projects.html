<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nino Berber | Projets</title>
    <link rel="stylesheet" href="./projects.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@latest/dist/css/splide.min.css">
</head>
<body>
    <nav id="navbar">
        <a href="/portfolio/homepage/index.html"><img class="logo" src="/portfolio/assets/img/NB_logo_black.png" alt="Logo Nino Berber"></a>
        <div class="nav-links">
            <a href="/portfolio/homepage/index.html" class="nav-item">Accueil</a>
            <a href="/portfolio/projects/projects.html" class="nav-item selected">Projets</a>
            <a href="/portfolio/propos/propos.html" class="nav-item">À propos</a>
        </div>
        <button class="nav-button"><a>Discutons</a></button>
        <div class="burger">
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
    <main>
        <section class="head-section">
            <h1>Projets</h1>
            <div class="filters">
                <div class="dev-anchor filter">
                    <a href="#dev">Développement</a>
                </div>
                <!-- <div class="design-anchor filter">
                    <a href="#design">Design</a>
                </div> -->
            </div>
        </section>
        <section id="dev" class="splide">
            <h2 id="carousel-heading">Développement</h2>
            <div class="splide__track">
                <ul class="splide__list">
                    <li class="splide__slide">
                        <img src="/portfolio/assets/img/project1_thumbnail.png" alt="First project thumbnail">
                        <div class="slide-content">
                            <h3>Refonte d’un site</h3>
                            <p>Ce projet a été réalisé en équipe lors d’une semaine dédiée au développement web à MMI Bordeaux.</p>
                            <button class="plus-button">
                                En voir davantage
                                <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14.3967 10.9601L22.9809 10.9601L22.9809 19.5444M10.9601 22.9809L22.8607 11.0803" stroke="black" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </li>
                </ul>  
            </div>
        </section>
        <section class="bottom-section">
            <h2>Discutons de votre projet</h2>
            <a href="mailto:ninberber@gmail.com">ninberber@gmail.com</a>
        </section>
    </main>
    <footer>
        <a href="">Mentions légales</a>
    </footer>
    <script>
        const burger = document.querySelector(".burger");
        const navMenu = document.querySelector(".nav-links");

        burger.addEventListener("click", mobileMenu);

        function mobileMenu() {
            burger.classList.toggle("active");
            navMenu.classList.toggle("active");
        }

        const navLink = document.querySelectorAll(".nav-item");

        navLink.forEach(n => n.addEventListener("click", closeMenu));

        function closeMenu() {
            burger.classList.remove("active");
            navMenu.classList.remove("active");
        }

        // When the user scrolls the page, execute myFunction
        window.onscroll = function() {myFunction()};

        // Get the navbar
        var navbar = document.getElementById("navbar");

        // Get the offset position of the navbar
        var sticky = navbar.offsetTop;

        // Add the sticky class to the navbar when you reach its scroll position. Remove "sticky" when you leave the scroll position
        function myFunction() {
        if (window.pageYOffset >= sticky) {
            navbar.classList.add("sticky")
        } else {
            navbar.classList.remove("sticky");
        }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@1.3.3/dist/js/splide.min.js"></script>
    <script>
        var splide = new Splide( '.splide', {
            type   : 'loop',
            padding: '5rem',
            margin : '5rem',
        });
        splide.mount();
    </script>
</body>
</html>
