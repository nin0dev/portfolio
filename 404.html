<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nino Berber | Erreur</title>
    <link rel="stylesheet" href="./404.css">
</head>
<body>
    <nav id="navbar">
        <a href="./index.html"><img class="logo" src="./assets/img/NB_logo_black.png" alt="Logo Nino Berber"></a>
        <div class="nav-links">
            <a href="#" class="nav-item selected">Accueil</a>
            <a href="/projects.html" class="nav-item">Projets</a>
            <a href="/propos/propos.html" class="nav-item">À propos</a>
        </div>
        <a href="/propos/propos.html"><button class="nav-button">Discutons</button></a>
        <div class="burger">
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
    <main>
        <div class="main">
            <h1>Erreur</h1>
            <h2>404</h2>
            <p>Page non trouvée</p>
            <a href="./index.html"><button>Revenir à la maison</button></a>
        </div>
    </main>

    <footer>
        <a href="/mentions-legales.html">Mentions légales</a>
    </footer>
    <script>
        const burger = document.querySelector(".burger");
        const navMenu = document.querySelector(".nav-links");

        burger.addEventListener("click", mobileMenu);

        function mobileMenu() {
            burger.classList.toggle("active");
            navMenu.classList.toggle("active");
        }

        const navLink = document.querySelectorAll(".nav-item");

        navLink.forEach(n => n.addEventListener("click", closeMenu));

        function closeMenu() {
            burger.classList.remove("active");
            navMenu.classList.remove("active");
        }

        // When the user scrolls the page, execute myFunction
        window.onscroll = function() {myFunction()};

        // Get the navbar
        var navbar = document.getElementById("navbar");

        // Get the offset position of the navbar
        var sticky = navbar.offsetTop;

        // Add the sticky class to the navbar when you reach its scroll position. Remove "sticky" when you leave the scroll position
        function myFunction() {
        if (window.pageYOffset >= sticky) {
            navbar.classList.add("sticky")
        } else {
            navbar.classList.remove("sticky");
        }
        }
    </script>
</body>
</html>
